name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package and dev tools
        run: python -m pip install .[dev]

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Run lint
        run: ruff check .

      - name: Run type check
        run: mypy src
